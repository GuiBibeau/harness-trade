name: Strategy Lab Synthesis

on:
  workflow_dispatch:
    inputs:
      brief_file:
        description: Repo-relative path to a checked-in research brief JSON artifact
        required: true
      strategy_key:
        description: Optional synthesized strategy key override
        required: false
      title:
        description: Optional synthesized strategy title override
        required: false
      preferred_venue:
        description: Optional venue key override
        required: false
      market_type:
        description: Optional market type override
        required: false
      issue_number:
        description: Optional GitHub issue number to comment with the synthesis summary
        required: false

permissions:
  contents: read
  issues: write

jobs:
  synthesis:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Install deps
        run: bun install

      - name: Check admin credentials
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_TOKEN:-}" ]; then
            echo "::error::Missing required secret ADMIN_TOKEN for strategy-lab synthesis."
            exit 1
          fi

      - name: Build synthesis artifact
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          BRIEF_FILE: ${{ inputs.brief_file }}
          STRATEGY_KEY: ${{ inputs.strategy_key }}
          TITLE: ${{ inputs.title }}
          PREFERRED_VENUE: ${{ inputs.preferred_venue }}
          MARKET_TYPE: ${{ inputs.market_type }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/strategy-lab-synthesis

          args=(
            --base-url https://api.trader-ralph.com
            --admin-token "${ADMIN_TOKEN}"
            --output-dir .tmp/strategy-lab-synthesis
            --brief-file "${BRIEF_FILE}"
          )

          if [ -n "${STRATEGY_KEY:-}" ]; then
            args+=(--strategy-key "${STRATEGY_KEY}")
          fi

          if [ -n "${TITLE:-}" ]; then
            args+=(--title "${TITLE}")
          fi

          if [ -n "${PREFERRED_VENUE:-}" ]; then
            args+=(--preferred-venue "${PREFERRED_VENUE}")
          fi

          if [ -n "${MARKET_TYPE:-}" ]; then
            args+=(--market-type "${MARKET_TYPE}")
          fi

          bun run strategy-lab:synthesize "${args[@]}"

          cat .tmp/strategy-lab-synthesis/synthesis.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload synthesis artifact
        uses: actions/upload-artifact@v4
        with:
          name: strategy-lab-synthesis-${{ github.run_id }}
          path: .tmp/strategy-lab-synthesis
          if-no-files-found: error

      - name: Comment on issue
        if: ${{ inputs.issue_number != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          title="$(jq -r '.hypothesis.title' .tmp/strategy-lab-synthesis/synthesis.json)"
          strategy_key="$(jq -r '.hypothesis.strategyKey' .tmp/strategy-lab-synthesis/synthesis.json)"
          synthesis_id="$(jq -r '.synthesisId' .tmp/strategy-lab-synthesis/synthesis.json)"
          issue_title="$(jq -r '.implementationPlan.issueTitle' .tmp/strategy-lab-synthesis/synthesis.json)"
          run_url="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          body="$(cat <<EOF
          Strategy-lab synthesis artifact ready.

          - synthesisId: \`${synthesis_id}\`
          - strategyKey: \`${strategy_key}\`
          - title: ${title}
          - suggested candidate issue: ${issue_title}
          - workflow run: ${run_url}
          EOF
          )"

          payload="$(jq -n --arg body "$body" '{body:$body}')"
          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "${payload}" >/dev/null
